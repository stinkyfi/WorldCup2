# Local PostgreSQL for WorldCup2 (Story 1.8+)
# Usage: docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: worldcup2-postgres
    # Host 5433 avoids clashing with a local PostgreSQL install on 5432 (Windows/macOS).
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: worldcup2
      POSTGRES_PASSWORD: worldcup2_dev
      POSTGRES_DB: worldcup2
    volumes:
      - wc2_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worldcup2 -d worldcup2"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  wc2_pgdata:
